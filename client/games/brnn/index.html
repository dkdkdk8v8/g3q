<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>百人牛牛</title>
  <link rel="preload" as="image" href="./src/assets/lobby/bg.jpg" />
</head>

<body>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>

<script>
  // 1. 拦截手势缩放
  document.addEventListener('gesturestart', function (event) {
    event.preventDefault();
  });

  // 2. 拦截双击缩放
  let lastTouchEnd = 0;
  document.addEventListener('touchend', function (event) {
    const now = (new Date()).getTime();
    if (now - lastTouchEnd <= 300) {
      event.preventDefault();
    }
    lastTouchEnd = now;
  }, false);

  // 3. 阻止 Safari 默认的滑动行为
  document.addEventListener('touchmove', function (e) {
    const scrollArea = e.target.closest('.trend-table-wrap');

    if (scrollArea) {
      const top = scrollArea.scrollTop;
      const totalScroll = scrollArea.scrollHeight;
      const currentScroll = top + scrollArea.offsetHeight;

      if (top === 0 && e.movementY > 0) {
        e.preventDefault();
      } else if (currentScroll === totalScroll && e.movementY < 0) {
        e.preventDefault();
      }
      return;
    }

    if (e.cancelable) {
      e.preventDefault();
    }
  }, { passive: false });
</script>

</html>
