<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>抢庄牛牛</title>
</head>

<body>
  <div id="app">
    <style>
      .app-loading-skeleton {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background-color: #222222;
        background-image: url("./src/assets/lobby/bg.jpg");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 99999;
      }

      .loading-spinner {
        width: 40px;
        height: 40px;
        border: 4px solid rgba(255, 215, 0, 0.2);
        border-top-color: #FFFFFF;
        text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
        font-weight: bold;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 16px;
      }

      .loading-text {
        color: #FFFFFF;
        text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
        font-weight: bold;
        font-family: "Microsoft YaHei", Arial, sans-serif;
        font-size: 15px;
        letter-spacing: 2px;
        animation: pulse 1.5s ease-in-out infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes pulse {

        0%,
        100% {
          opacity: 0.5;
        }

        50% {
          opacity: 1;
        }
      }
    </style>
    <style>
      .app-loading-skeleton::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        z-index: 1;
      }

      .loading-content {
        position: relative;
        z-index: 2;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
    </style>
    <div class="app-loading-skeleton">
      <div class="loading-content">
        <div class="loading-spinner"></div>
        <div class="loading-text">正在努力加载中...</div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
</body>

<script>
  // 1. 修正拼写并拦截手势缩放
  document.addEventListener('gesturestart', function (event) {
    event.preventDefault();
  });

  // 2. 拦截双击缩放
  let lastTouchEnd = 0;
  document.addEventListener('touchend', function (event) {
    const now = (new Date()).getTime();
    if (now - lastTouchEnd <= 300) {
      event.preventDefault();
    }
    lastTouchEnd = now;
  }, false);

  // 3. 核心：阻止 Safari 默认的滑动行为
  // passive: false 是必须的，否则 preventDefault 不起作用
  document.addEventListener('touchmove', function (e) {
    //查找特定可以滚动的组件进行
    const scrollArea = e.target.closest('.history-list-new') || e.target.closest('.rooms-scroll-area') || e.target.closest('.help-content');

    if (scrollArea) {
      // 如果在滚动区域内
      // 判断当前是否在顶部或底部边缘，防止触发 Safari 的橡皮筋回弹
      const top = scrollArea.scrollTop;
      const totalScroll = scrollArea.scrollHeight;
      const currentScroll = top + scrollArea.offsetHeight;

      if (top === 0 && e.movementY > 0) {
        // 已经在顶部还要往下拉，拦截
        e.preventDefault();
      } else if (currentScroll === totalScroll && e.movementY < 0) {
        // 已经在底部还要往上拉，拦截
        e.preventDefault();
      }

      // 正常滚动范围内，不做 e.preventDefault()，允许它滚
      return;
    }

    // 非滚动区域（比如 top-bar, logo-row），一律禁止滑动
    if (e.cancelable) {
      e.preventDefault();
    }
  }, { passive: false });
</script>

</html>
